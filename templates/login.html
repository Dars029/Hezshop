{% extends "base.html" %}

{% block content %}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;">
    <!-- Decorative background elements -->
    <div style="position: absolute; top: 10%; left: 15%; width: 300px; height: 300px; background: radial-gradient(circle, var(--primary-color) 0%, transparent 70%); opacity: 0.1; filter: blur(40px); border-radius: 50%;"></div>
    <div style="position: absolute; bottom: -10%; right: 5%; width: 400px; height: 400px; background: radial-gradient(circle, var(--accent-yellow) 0%, transparent 70%); opacity: 0.1; filter: blur(40px); border-radius: 50%;"></div>

    <div class="form-container" style="position:relative; z-index: 10; width: 100%; max-width: 440px;">
        <a href="/" class="d-flex align-center text-muted" style="gap: 0.5rem; font-size: 0.85rem; font-weight: 600; margin-bottom: 2rem; position: absolute; top: 1rem; left: 1rem;">
            <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i> Back to Home
        </a>
        <div class="text-center mb-4 text-center" style="text-align: center; margin-top: 2rem;">
            <i data-lucide="shopping-bag" style="color: var(--primary-color); width: 48px; height: 48px; margin-bottom: 1rem;"></i>
            <h2 style="font-size: 2rem; font-weight: 700;">Welcome Back</h2>
            <p class="text-muted mt-1">Enter your credentials to access your atrium.</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label class="form-label text-muted" style="font-size: 0.75rem;">Email or Phone</label>
                <div style="position: relative;">
                    <i data-lucide="user" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 20px; height: 20px;"></i>
                    <input type="text" name="username" class="form-input" style="padding-left: 3rem; background: var(--bg-alt); border-radius: var(--radius-lg);" placeholder="name@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <div class="d-flex justify-between">
                    <label class="form-label text-muted" style="font-size: 0.75rem;">Password</label>
                    <a href="#" style="font-size: 0.75rem; color: var(--primary-color); font-weight: 600;">FORGOT PASSWORD?</a>
                </div>
                <div style="position: relative;">
                    <i data-lucide="key" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 20px; height: 20px;"></i>
                    <input type="password" name="password" class="form-input" style="padding-left: 3rem; padding-right: 3rem; background: var(--bg-alt); border-radius: var(--radius-lg);" placeholder="••••••••" required>
                    <i data-lucide="eye" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 20px; height: 20px; cursor: pointer;"></i>
                </div>
            </div>

            {% if error %}
            <div style="color: #ef4444; font-size: 0.875rem; margin-top: 1rem; text-align: center;">
                {{ error }}
            </div>
            {% endif %}

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; border-radius: var(--radius-lg); font-size: 1.1rem; display: flex; justify-content: center; align-items: center; gap: 0.5rem; margin-top: 2rem;">
                Login <i data-lucide="arrow-right" style="width: 20px; height: 20px;"></i>
            </button>
        </form>

        <div style="text-align: center; margin-top: 2rem; position: relative;">
            <div style="height: 1px; background: var(--border-color); width: 100%; position: absolute; top: 50%; z-index: 1;"></div>
            <span style="background: var(--bg-color); padding: 0 1rem; position: relative; z-index: 2; font-size: 0.8rem; color: var(--text-muted);">New to Hezshop?</span>
        </div>

        <a href="/signup" class="btn" style="width: 100%; padding: 1rem; border-radius: var(--radius-lg); display: flex; justify-content: center; align-items: center; gap: 0.5rem; background: var(--secondary-color); color: var(--text-main); font-weight: 600; margin-top: 1.5rem;">
            Create Account <i data-lucide="user-plus" style="width: 20px; height: 20px;"></i>
        </a>
    </div>
</div>
{% endblock %}
